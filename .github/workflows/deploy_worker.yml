# GitHub Action: Deploy Backend to Cloudflare Workers
# 
# This workflow automatically deploys the backend worker to Cloudflare.
# By default, it triggers on changes to worker.mjs for continuous deployment.
# Alternative mode: Deploy only on release tags (see commented section below).
# 
# Note: This workflow deploys ONLY the worker code. HTML pages are deployed
# separately via the deploy_pages workflow and are not included in this deployment.

name: Deploy Backend to Cloudflare Workers

on:
  # CURRENT MODE: Deploy on every push that changes worker.mjs
  # This ensures the latest backend code is always deployed automatically
  push:
    paths:
      - 'worker.mjs'

# ALTERNATIVE MODE: Deploy only on releases/tags
# To switch modes:
# 1. Comment out the 'push' block above (lines 13-16)
# 2. Uncomment the block below (lines 22-26)
# This mode deploys only when a new release is published or a version tag is pushed
#  push:
#    tags:
#      - 'v*'  # Triggers on version tags like v1.0.0, v0.0.4, etc.
#  release:
#    types: [published]  # Triggers when a GitHub release is published

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      # Step 1: Checkout the repository with full git history
      # fetch-depth: 0 ensures we get all tags and branches for version resolution
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Node.js environment
      # Using Node.js 20 LTS for consistency with Cloudflare Workers runtime
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install project dependencies
      # Required for Wrangler CLI and any npm packages used by the worker
      - name: Install dependencies
        run: npm install

      # Step 4: Resolve version tag, branch name, and commit hash
      # Extracts git metadata to embed into the deployed worker
      # GIT_TAG: Latest version tag (e.g., v0.0.4) or "untagged" if none exists
      # GIT_BRANCH: Current branch name, defaulting to "main" if not detected
      # GIT_COMMIT: Short commit hash (7 chars) for tracking exact deployment version
      - name: Resolve version and branch
        id: version
        run: |
          # Try to get exact tag for current commit, fallback to latest tag, or "untagged"
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "untagged")
          # Find the branch containing HEAD, excluding detached HEAD states
          GIT_BRANCH=$(git branch -r --contains HEAD | grep -v HEAD | sed 's|origin/||' | tr -d ' ' | head -1 || echo "main")
          # Get shortened commit hash (first 7 characters)
          GIT_COMMIT=$(git rev-parse --short=7 HEAD)
          # Fallback to main branch if detection fails
          if [ -z "$GIT_BRANCH" ]; then
            GIT_BRANCH="main"
          fi
          # Export values for use in subsequent steps
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_OUTPUT
          echo "GIT_BRANCH=$GIT_BRANCH" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "Deploying tag=$GIT_TAG branch=$GIT_BRANCH commit=$GIT_COMMIT"

      # Step 5: Inject version metadata into wrangler.toml
      # Updates APP_VERSION, APP_BRANCH, and APP_COMMIT variables in the config file
      # This allows the worker to expose version info via API endpoints
      - name: Patch wrangler.toml with dynamic version and branch
        run: |
          sed -i "s|^APP_VERSION = .*|APP_VERSION = \"${{ steps.version.outputs.GIT_TAG }}\"|" wrangler.toml
          sed -i "s|^APP_BRANCH = .*|APP_BRANCH = \"${{ steps.version.outputs.GIT_BRANCH }}\"|" wrangler.toml
          sed -i "s|^APP_COMMIT = .*|APP_COMMIT = \"${{ steps.version.outputs.GIT_COMMIT }}\"|" wrangler.toml
          echo "--- wrangler.toml [vars] after patch ---"
          grep -A5 '\[vars\]' wrangler.toml

      # Step 6: Deploy to Cloudflare Workers (worker code only, no assets)
      # Uses official Cloudflare Wrangler action with credentials from repository secrets
      # Secrets required: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
      # Note: The wrangler.toml config no longer includes [assets] section,
      # ensuring HTML pages are NOT uploaded during worker deployment
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
