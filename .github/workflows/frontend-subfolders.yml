name: Deploy Frontend Subfolders to Pages

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  deploy-branch-subfolder:
    runs-on: ubuntu-latest
    name: Deploy branch subfolder to Pages
    permissions:
      contents: write
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set branch name
        id: branch
        run: echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No build step needed: public/ is already static
      # But if you add a build step later, run it here

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare pages-builds branch and add subfolder
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SOURCE_DIR="$(pwd)/public"
          
          # Switch to pages-builds branch (create if needed)
          git fetch origin pages-builds 2>/dev/null || true
          if git ls-remote --exit-code --heads origin pages-builds; then
            git checkout pages-builds
            git pull origin pages-builds
          else
            git checkout --orphan pages-builds
            git rm -rf . --quiet || true
            # Copy main frontend to root from public/ in source
            git checkout ${GITHUB_SHA} -- public/
            cp -r public/. .
            rm -rf public/
            git add -A
            git commit -m "chore: init pages-builds branch with main frontend"
            git push origin pages-builds
            git checkout ${GITHUB_SHA} -- public/
          fi
          
          # Create/update the branches/<branchname>/ subfolder
          mkdir -p "branches/${BRANCH_NAME}"
          
          # Copy the static frontend (with patched base href for subpath)
          cp -r "${SOURCE_DIR}/"* "branches/${BRANCH_NAME}/"
          
          # Patch index.html base href so relative assets load from subfolder
          if [ -f "branches/${BRANCH_NAME}/index.html" ]; then
            sed -i 's|<head>|<head>\n  <base href="/branches/'"${BRANCH_NAME}"'/">|' "branches/${BRANCH_NAME}/index.html"
          fi
          
          # Patch instructor.html too if it exists
          if [ -f "branches/${BRANCH_NAME}/instructor.html" ]; then
            sed -i 's|<head>|<head>\n  <base href="/branches/'"${BRANCH_NAME}"'/">|' "branches/${BRANCH_NAME}/instructor.html"
          fi
          
          # Patch api.js to use absolute Worker URL (so API calls don't go to /branches/...)
          if [ -f "branches/${BRANCH_NAME}/js/api.js" ]; then
            sed -i "s|const API='/'|const API='https://pw-hack-demo-app.andreas-zengel.workers.dev/'|" "branches/${BRANCH_NAME}/js/api.js"
          fi
          
          # Commit and push
          git add "branches/${BRANCH_NAME}"
          git diff --cached --quiet || git commit -m "deploy: branch ${BRANCH_NAME} to branches/${BRANCH_NAME}/"
          git push origin pages-builds
          
          echo "Branch ${BRANCH_NAME} deployed to branches/${BRANCH_NAME}/"

      - name: Deploy to Cloudflare Pages via API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Trigger a new Pages deployment for pages-builds branch
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/941962c9311eef365b254a2c6eea3e58/pages/projects/pw-hack-demo/deployments" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "pages-builds"}' \
            | jq -r '.result.url // .errors'
